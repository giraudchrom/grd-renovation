[build]
  publish = "."

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"
    Access-Control-Allow-Origin = "*"
